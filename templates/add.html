<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>添加实验记录</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>添加新实验</h1>
    <div style="display: flex; justify-content: space-between; align-items: center;">
    <h1>📋 我的网络实验记录</h1>
    <div>
        {% if session.username %}
            <span>欢迎，{{ session.username }}！</span>
            <a href="{{ url_for('auth.logout') }}" style="margin-left: 20px;">退出登录</a>
        {% else %}
            <a href="{{ url_for('auth.login') }}">登录</a>
            <a href="{{ url_for('auth.register') }}" style="margin-left: 10px;">注册</a>
        {% endif %}
    </div>
</div>
    <form method="post">
        <label>实验名称：</label><input type="text" name="exp_name" required><br><br>
        <label>实验日期：</label><input type="date" name="exp_date" required><br><br>
        <label>攻击机IP：</label><input type="text" name="attacker_ip"><br><br>
        <label>靶机IP：</label><input type="text" name="target_ip"><br><br>
        <label>网关IP：</label><input type="text" name="gateway_ip"><br><br>
        <label>是否成功：</label><input type="checkbox" name="success" value="true"><br><br>
        <label>备注：</label><textarea name="notes" rows="4" cols="50"></textarea><br><br>
        <label>实验报告（可包含Markdown）：</label><br>
        <textarea name="report" rows="15" cols="80" placeholder="请输入文本">{{ exp.report if exp else '' }}</textarea><br><br>
        <button type="submit">提交</button>
    </form>
    <br>
    <a href="{{ url_for('experiments.index') }}">返回首页</a>
</body>
</html>
