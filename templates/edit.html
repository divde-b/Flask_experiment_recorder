<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>编辑实验记录</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS/style.css') }}">
</head>
<body>
    <h1>✏️ 编辑实验</h1>
    <div style="display: flex; justify-content: space-between; align-items: center;">
    <h1>📋 我的网络实验记录</h1>
    <div>
        {% if session.username %}
            <span>欢迎，{{ session.username }}！</span>
            <a href="{{ url_for('auth.logout') }}" style="margin-left: 20px;">退出登录</a>
        {% else %}
            <a href="{{ url_for('auth.login') }}">登录</a>
            <a href="{{ url_for('auth.register') }}" style="margin-left: 10px;">注册</a>
        {% endif %}
    </div>
</div>
    <form method="post">
        <label>实验名称：</label><input type="text" name="exp_name" value="{{ exp.exp_name }}" required><br>
        <label>实验日期：</label><input type="date" name="exp_date" value="{{ exp.exp_date }}" required><br>
        <label>攻击机IP：</label><input type="text" name="attacker_ip" value="{{ exp.attacker_ip or '' }}"><br>
        <label>靶机IP：</label><input type="text" name="target_ip" value="{{ exp.target_ip or '' }}"><br>
        <label>网关IP：</label><input type="text" name="gateway_ip" value="{{ exp.gateway_ip or '' }}"><br>
        <label>是否成功：</label><input type="checkbox" name="success" value="true" {% if exp.success %}checked{% endif %}><br>
        <label>备注：</label><textarea name="notes" rows="4">{{ exp.notes or '' }}</textarea><br>
        <button type="submit">更新</button>
        <label>实验报告(可包含Markdown)</label><br>
<textarea name="report" rows="15" cols="80" placeholder="请输入文本">{{ exp.report or '' }}</textarea><br><br>
    </form>
    <a class="back-link" href="{{ url_for('experiments.index') }}">← 返回首页</a>
</body>
</html>
