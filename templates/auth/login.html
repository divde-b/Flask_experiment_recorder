<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>登录</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>用户登录</h1>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="flashes {{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}
    <form method="POST">
        <label>用户名：</label><input type="text" name="username" required><br><br>
        <label>密码：</label><input type="password" name="password" required><br><br>
        <label><input type="checkbox" name="remember">记住我</label><br><br>
        <button type="submit">登录</button>
    </form>
    <p>还没有账号？<a href="{{ url_for('auth.register') }}">立即注册</a></p>
    <a href="{{ url_for('experiments.index') }}">返回首页</a>
</body>
</html>
