<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>注册</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>用户注册</h1>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="flashes {{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}
    <form method="post">
        <label>用户名：</label><input type="text" name="username" required><br><br>
        <label>密码：</label><input type="password" name="password" required><br><br>
        <label>确认密码：</label><input type="password" name="confirm" required><br><br>
        <button type="submit">注册</button>
    </form>
    <p>已有账号？<a href="{{ url_for('auth.login') }}">去登录</a></p>
    <a href="{{ url_for('experiments.index') }}">返回首页</a>
</body>
</html>
